name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build-cpu-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)

          # Stamp __version__ in Python package
          init = Path("python/warp_md/__init__.py")
          text = init.read_text()
          text = re.sub(r'__version__ = ".*?"', f'__version__ = "{version}"', text)
          init.write_text(text)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.13.1
          python -m pip install pytest

      - name: Run warp-cg production tests
        run: cargo test -p warp-cg

      - name: Build CPU wheels (manylinux2014)
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          CMAKE_ARGS: "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        with:
          command: build
          docker-options: >-
            -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            -e CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          args: >-
            --release
            --out target/wheels
            --interpreter /opt/python/cp39-cp39/bin/python
            --interpreter /opt/python/cp310-cp310/bin/python
            --interpreter /opt/python/cp311-cp311/bin/python
            --interpreter /opt/python/cp312-cp312/bin/python
            --interpreter /opt/python/cp313-cp313/bin/python
          manylinux: 2_28
          target: x86_64
          before-script-linux: |
            set -eux
            CMAKE_PATH=$(which cmake)
            mv "$CMAKE_PATH" "${CMAKE_PATH}.real"
            cat << 'EOF' > "$CMAKE_PATH"
            #!/bin/bash
            is_build=0
            for arg in "$@"; do
              if [ "$arg" = "--build" ]; then
                is_build=1
                break
              fi
            done
            if [ "$is_build" -eq 1 ]; then
              exec "${0}.real" "$@"
            else
              exec "${0}.real" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 "$@"
            fi
            EOF
            chmod +x "$CMAKE_PATH"

      - name: Install CPU wheel and run release-critical tests
        run: |
          WHEEL=$(python - <<'PY'
          import glob
          import sys

          tag = f"cp{sys.version_info.major}{sys.version_info.minor}"
          wheels = sorted(glob.glob(f"target/wheels/warp_md-*-{tag}-{tag}-*.whl"))
          if not wheels:
              raise SystemExit(f"no wheel for {tag}")
          print(wheels[0])
          PY
          )
          python -m pip install "$WHEEL"
          python -m pytest \
            python/warp_md/tests/test_pack.py \
            python/warp_md/tests/test_cg_cli.py

      - name: Build CPU sdist
        run: maturin sdist --out target/wheels

      - name: Upload CPU Linux wheels
        uses: actions/upload-artifact@v4
        with:
          name: cpu-wheels-linux
          path: target/wheels/warp_md-*.whl

      - name: Upload CPU sdist
        uses: actions/upload-artifact@v4
        with:
          name: cpu-sdist
          path: target/wheels/*.tar.gz

  build-cpu-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)

          # Stamp __version__ in Python package
          init = Path("python/warp_md/__init__.py")
          text = init.read_text()
          text = re.sub(r'__version__ = ".*?"', f'__version__ = "{version}"', text)
          init.write_text(text)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.13.1

      - name: Build CPU wheel (Windows)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pythonExe = (Get-Command python).Source
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              python -m maturin build `
                --release `
                --out target/wheels `
                --interpreter "$pythonExe" `
                -v
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning "maturin build failed on attempt $attempt; retrying after crates.io backoff"
              Start-Sleep -Seconds (20 * $attempt)
            }
          }
          Write-Host "Wheels produced:"
          Get-ChildItem -Path target/wheels -Filter '*.whl' -File | Format-Table Name, Length, LastWriteTime

      - name: Smoke test installed Windows wheel
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $wheelDir = Join-Path $env:GITHUB_WORKSPACE 'target\wheels'
          if (-not (Test-Path $wheelDir)) {
            throw "Wheel output directory missing: $wheelDir"
          }
          $wheels = Get-ChildItem -Path $wheelDir -Filter '*.whl' -File
          if (-not $wheels) {
            throw "No Windows wheel found in $wheelDir"
          }
          $wheel = $wheels | Where-Object { $_.Name -like 'warp_md-*.whl' } | Select-Object -First 1
          if (-not $wheel) {
            $names = ($wheels | ForEach-Object Name) -join ', '
            throw "Wheel(s) were produced, but none matched warp_md-*.whl. Produced: $names"
          }
          python -m pip install --force-reinstall $wheel.FullName
          python -c "import warp_md; print(warp_md.__file__)"

      - name: Upload CPU Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: cpu-wheels-windows-py${{ matrix.python-version }}
          path: target/wheels/warp_md-*.whl

  publish-cpu:
    runs-on: ubuntu-latest
    needs: [build-cpu-linux, build-cpu-windows]
    steps:
      - name: Download CPU Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: cpu-wheels-linux
          path: target/wheels

      - name: Download CPU Windows wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cpu-wheels-windows-*
          path: target/wheels
          merge-multiple: true

      - name: Download CPU sdist
        uses: actions/download-artifact@v4
        with:
          name: cpu-sdist
          path: target/wheels

      - name: Publish CPU package to PyPI (warp-md)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels

  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)

          # Stamp __version__ in Python package
          init = Path("python/warp_md/__init__.py")
          text = init.read_text()
          text = re.sub(r'__version__ = ".*?"', f'__version__ = "{version}"', text)
          init.write_text(text)
          PY

      - name: Switch package name to warp-md-cuda
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("pyproject.toml")
          data = path.read_text()
          data = data.replace('name = "warp-md"', 'name = "warp-md-cuda"')
          path.write_text(data)
          PY

      - name: Build CUDA wheels (manylinux_2_28)
        uses: PyO3/maturin-action@v1
        env:
          CUDA_HOME: /usr/local/cuda
          PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          CMAKE_ARGS: "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        with:
          command: build
          docker-options: >-
            -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            -e CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          args: >-
            --release --features cuda,extension-module
            --out target/wheels
            --interpreter /opt/python/cp39-cp39/bin/python
            --interpreter /opt/python/cp310-cp310/bin/python
            --interpreter /opt/python/cp311-cp311/bin/python
            --interpreter /opt/python/cp312-cp312/bin/python
            --interpreter /opt/python/cp313-cp313/bin/python
          manylinux: 2_28
          before-script-linux: |
            set -eux
            CMAKE_PATH=$(which cmake)
            mv "$CMAKE_PATH" "${CMAKE_PATH}.real"
            cat << 'EOF' > "$CMAKE_PATH"
            #!/bin/bash
            is_build=0
            for arg in "$@"; do
              if [ "$arg" = "--build" ]; then
                is_build=1
                break
              fi
            done
            if [ "$is_build" -eq 1 ]; then
              exec "${0}.real" "$@"
            else
              exec "${0}.real" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 "$@"
            fi
            EOF
            chmod +x "$CMAKE_PATH"
            yum -y install dnf-plugins-core
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
            dnf clean expire-cache
            dnf -y install cuda-toolkit-12-4
            CUDA_DIR="$(ls -d /usr/local/cuda-* | sort -V | tail -1)"
            ln -sfn "$CUDA_DIR" /usr/local/cuda

      - name: Upload CUDA wheels
        uses: actions/upload-artifact@v4
        with:
          name: cuda-wheels
          path: target/wheels

  publish-cuda:
    runs-on: ubuntu-latest
    needs: build-cuda
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download CUDA wheels
        uses: actions/download-artifact@v4
        with:
          name: cuda-wheels
          path: target/wheels

      - name: Install CUDA wheel and run release-critical tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          WHEEL=$(python - <<'PY'
          import glob
          import sys

          tag = f"cp{sys.version_info.major}{sys.version_info.minor}"
          wheels = sorted(glob.glob(f"target/wheels/warp_md_cuda-*-{tag}-{tag}-*.whl"))
          if not wheels:
              raise SystemExit(f"no CUDA wheel for {tag}")
          print(wheels[0])
          PY
          )
          python -m pip install "$WHEEL"
          python -m pytest \
            python/warp_md/tests/test_pack.py \
            python/warp_md/tests/test_cg_cli.py

      - name: Publish CUDA package to PyPI (warp-md-cuda)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels

  release-notes:
    runs-on: ubuntu-latest
    needs: [publish-cpu, publish-cuda]
    steps:
      - name: Create GitHub Release Notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag || github.ref_name }}
