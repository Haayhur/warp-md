name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build-cpu-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.5.1
          python -m pip install pytest

      - name: Build CPU wheels (manylinux2014)
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          command: build
          docker-options: >-
            -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          args: >-
            --release
            --out target/wheels
            --interpreter /opt/python/cp38-cp38/bin/python
            --interpreter /opt/python/cp39-cp39/bin/python
            --interpreter /opt/python/cp310-cp310/bin/python
            --interpreter /opt/python/cp311-cp311/bin/python
            --interpreter /opt/python/cp312-cp312/bin/python
            --interpreter /opt/python/cp313-cp313/bin/python
          manylinux: 2014
          target: x86_64

      - name: Install CPU wheel and run pack export tests
        run: |
          ls -1 target/wheels
          python -m pip install target/wheels/warp_md-*.whl
          python -m pytest python/warp_md/tests/test_pack.py

      - name: Build CPU sdist
        run: maturin sdist --out target/wheels

      - name: Upload CPU Linux wheels
        uses: actions/upload-artifact@v4
        with:
          name: cpu-wheels-linux
          path: target/wheels/warp_md-*.whl

      - name: Upload CPU sdist
        uses: actions/upload-artifact@v4
        with:
          name: cpu-sdist
          path: target/wheels/*.tar.gz

  build-cpu-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.5.1

      - name: Build CPU wheel (Windows)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        shell: pwsh
        run: |
          $wheelDir = Join-Path $env:GITHUB_WORKSPACE 'target\wheels'
          New-Item -ItemType Directory -Force -Path $wheelDir | Out-Null
          python -m maturin build --release --interpreter python --out $wheelDir

      - name: Smoke test installed Windows wheel
        shell: pwsh
        run: |
          $wheelDir = Join-Path $env:GITHUB_WORKSPACE 'target\wheels'
          if (-not (Test-Path $wheelDir)) {
            throw "Wheel output directory missing: $wheelDir"
          }
          Get-ChildItem -Path $wheelDir
          $wheel = Get-ChildItem -Path $wheelDir -Filter 'warp_md-*.whl' | Select-Object -First 1
          if (-not $wheel) {
            throw "No Windows wheel found in $wheelDir"
          }
          python -m pip install --force-reinstall $wheel.FullName
          python -c "import warp_md; print(warp_md.__file__)"

      - name: Upload CPU Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: cpu-wheels-windows-py${{ matrix.python-version }}
          path: target/wheels/warp_md-*.whl

  publish-cpu:
    runs-on: ubuntu-latest
    needs: [build-cpu-linux, build-cpu-windows]
    steps:
      - name: Download CPU Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: cpu-wheels-linux
          path: target/wheels

      - name: Download CPU Windows wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cpu-wheels-windows-*
          path: target/wheels
          merge-multiple: true

      - name: Download CPU sdist
        uses: actions/download-artifact@v4
        with:
          name: cpu-sdist
          path: target/wheels

      - name: Publish CPU package to PyPI (warp-md)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels

  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: relver
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        env:
          RELEASE_VERSION: ${{ steps.relver.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          def update(path: Path) -> None:
            text = path.read_text()
            text = re.sub(r'(?m)^version = ".*?"$', f'version = "{version}"', text)
            path.write_text(text)

          update(Path("pyproject.toml"))
          for cargo in Path("crates").rglob("Cargo.toml"):
            update(cargo)
          PY

      - name: Switch package name to warp-md-cuda
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("pyproject.toml")
          data = path.read_text()
          data = data.replace('name = "warp-md"', 'name = "warp-md-cuda"')
          path.write_text(data)
          PY

      - name: Build CUDA wheels (manylinux_2_28)
        uses: PyO3/maturin-action@v1
        env:
          CUDA_HOME: /usr/local/cuda
          PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          command: build
          docker-options: >-
            -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          args: >-
            --release --features cuda
            --out target/wheels
            --interpreter /opt/python/cp38-cp38/bin/python
            --interpreter /opt/python/cp39-cp39/bin/python
            --interpreter /opt/python/cp310-cp310/bin/python
            --interpreter /opt/python/cp311-cp311/bin/python
            --interpreter /opt/python/cp312-cp312/bin/python
            --interpreter /opt/python/cp313-cp313/bin/python
          manylinux: 2_28
          before-script-linux: |
            set -eux
            yum -y install dnf-plugins-core
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
            dnf clean expire-cache
            dnf -y install cuda-toolkit-12-4
            CUDA_DIR="$(ls -d /usr/local/cuda-* | sort -V | tail -1)"
            ln -sfn "$CUDA_DIR" /usr/local/cuda

      - name: Upload CUDA wheels
        uses: actions/upload-artifact@v4
        with:
          name: cuda-wheels
          path: target/wheels

  publish-cuda:
    runs-on: ubuntu-latest
    needs: build-cuda
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download CUDA wheels
        uses: actions/download-artifact@v4
        with:
          name: cuda-wheels
          path: target/wheels

      - name: Install CUDA wheel and run pack export tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          ls -1 target/wheels
          python -m pip install target/wheels/warp_md_cuda-*.whl
          python -m pytest python/warp_md/tests/test_pack.py

      - name: Publish CUDA package to PyPI (warp-md-cuda)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels

  release-notes:
    runs-on: ubuntu-latest
    needs: [publish-cpu, publish-cuda]
    steps:
      - name: Create GitHub Release Notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag || github.ref_name }}
